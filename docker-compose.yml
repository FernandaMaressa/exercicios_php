services:

  # ── Servidor PHP + Apache ──────────────────
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - titans-network

  # ── Banco de dados MySQL ───────────────────
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: novos_titans_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./exercicio10/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - titans-network

  # ── phpMyAdmin ─────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - titans-network

volumes:
  db_data:

networks:
  titans-network:
    driver: bridge